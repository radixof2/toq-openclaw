name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  channel:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: channel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Install toq
        run: cargo install toq-cli --version ">=0.1.0-dev.10"
      - run: npm ci
      - name: Run tests
        run: TOQ_BIN=$(which toq) npx vitest run
