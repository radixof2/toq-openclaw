name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  relay:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run

  channel:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: channel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx vitest run
